              - dice_entropy
        SMOOTH: 0
        USE_OHEM: false
MODEL:
    value:
        EXTRA:
            BACKBONE: mit_b2
            BN_EPS: 0.001
            BN_MOMENTUM: 0.1
            DECODER: MLPDecoder
            DECODER_EMBED_DIM: 512
            DETECTION: null
            FIX_MODULES:
                - NP++
