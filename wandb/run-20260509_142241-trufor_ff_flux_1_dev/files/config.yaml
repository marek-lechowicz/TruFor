                - NP++
                - backbone
                - loc_head
            NP_WEIGHTS: pretrained_models/noiseprint++/noiseprint++.th
            PREPRC: imagenet
        MODS:
            - RGB
            - NP++
        NAME: detconfcmx
        PRETRAINED: pretrained_models/segformers/mit_b2.pth
OUTPUT_DIR:
    value: weights
TEST:
    value:
        MODEL_FILE: weights/trufor_ff_flux_1_dev/best.pth.tar
TRAIN:
    value:
        AUG: lib/config/aug_res_comp.yaml
        BATCH_SIZE_PER_GPU: 8
        BEGIN_EPOCH: 0
        END_EPOCH: 25
        EXTRA_EPOCH: 0
        IGNORE_LABEL: -1
        IMAGE_SIZE:
            - 512
            - 512
        LR: 0.005
        MOMENTUM: 0.9
        NESTEROV: false
        NUM_SAMPLES: 0
        OPTIMIZER: sgd
        PRETRAINING: null
        RESUME: true
        SHUFFLE: true
        STOP_EPOCH: -1
        WD: 0.0005
VALID:
    value:
        AUG: lib/config/aug_res_comp.yaml
        BEST_KEY: avg_p-F1_smooth
        FIRST_VALID: false
        IMAGE_SIZE: null
        MAX_SIZE: 2048
WORKERS:
    value: 8
